name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full build with the interactive Polyscope viewer (all targets).
          - name: viewer
            viewer: "ON"
          # Lightweight headless build: no Polyscope / OpenGL dependency.
          - name: headless
            viewer: "OFF"

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # Polyscope needs X11/OpenGL headers to build (only used by the viewer job,
          # but harmless to always install).
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            xorg-dev libglu1-mesa-dev

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DSUBGRID_POLYSCOPE_VIEWER=${{ matrix.viewer }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
